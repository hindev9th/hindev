<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đọc truyện</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" id="og-title" content="Đọc truyện tranh online" />
  <meta property="og:description" id="og-desc" content="Đọc ngay trên Comic App" />
  <meta property="og:image" id="og-image" content="" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" id="tw-title" content="Đọc truyện tranh online" />
  <meta name="twitter:image" id="tw-image" content="" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #FF6B35;
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #252532;
      --text: #f0f0f5;
      --muted: #8888aa;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0, 0, 0, .6);
    }

    /* ── Cover ── */
    .cover {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface2);
      overflow: hidden;
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity .4s;
    }

    .cover img.loaded {
      opacity: 1;
    }

    .cover-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(26, 26, 36, .95) 100%);
    }

    .cover-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
    }

    .app-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, .55);
      backdrop-filter: blur(8px);
      padding: 6px 12px;
      border-radius: 999px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .35;
      }
    }

    .app-badge span {
      font-size: 12px;
      color: #ccc;
      font-weight: 500;
    }

    /* ── Body ── */
    .body {
      padding: 20px;
    }

    .meta {
      margin-bottom: 20px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 13px;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .tag {
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 500;
    }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      text-decoration: none;
    }

    .btn:active {
      opacity: .82;
      transform: scale(.98);
    }

    .btn svg {
      flex-shrink: 0;
    }

    .btn-primary {
      padding: 16px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }

    .btn-secondary {
      padding: 14px;
      background: var(--surface2);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: #2e2e40;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--surface2);
    }

    /* ── Status chip ── */
    .status {
      margin-top: 14px;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 10px;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      display: none;
    }

    .status.show {
      display: flex;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- Cover -->
    <div class="cover">
      <div class="cover-placeholder" id="placeholder">📖</div>
      <img id="cover-img" src="" alt="" />
      <div class="cover-gradient"></div>
      <div class="app-badge">
        <div class="dot"></div><span>Comic App</span>
      </div>
    </div>

    <!-- Body -->
    <div class="body">
      <div class="meta">
        <div class="title" id="comic-title">Đang tải…</div>
        <div class="sub" id="comic-sub"></div>
        <div class="tags" id="comic-tags"></div>
      </div>

      <a class="btn btn-primary" id="btn-open" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
                 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8l6 4-6 4z" fill="white" />
        </svg>
        Mở trong ứng dụng
      </a>

      <div class="divider">hoặc</div>

      <a class="btn btn-secondary" id="btn-download" href="#">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M12 16l-5-5h3V4h4v7h3l-5 5z" fill="currentColor" />
          <path d="M5 20h14v-2H5v2z" fill="currentColor" />
        </svg>
        Tải ứng dụng (.apk)
      </a>

      <!-- Status: shown if app not found -->
      <div class="status" id="status">
        <svg width="14" height="14" viewBox="0 0 24 24">
          <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 11H11V7h2v6zm0 4H11v-2h2v2z" fill="currentColor" />
        </svg>
        Không tìm thấy ứng dụng. Hãy tải về để cài đặt.
      </div>
    </div>
  </div>

  <div class="footer">Comic App &mdash; Đọc truyện miễn phí</div>

  <script>
    /* ── CONFIG ─────────────────────────────────────── */
    const CFG = {
      scheme: 'comic',
      package: 'com.example.comic',
      apkUrl: 'https://github.com/hindev9th/hindev/releases/download/comic.v0.0.1.beta.1/ComicApp.apk',
    };
    /* ─────────────────────────────────────────────── */

    const p = new URLSearchParams(location.search);
    const comicId = p.get('id') || '';
    const name = p.get('name') || 'Truyện tranh';
    const image = p.get('image') || '';
    const author = p.get('author') || '';
    const desc = p.get('desc') || '';
    const chapter = p.get('chapter') || '';
    const tags = p.get('tags') || '';

    /* ── Populate ── */
    document.title = name + ' – Comic App';
    document.getElementById('comic-title').textContent = name;

    const subParts = [author && `Tác giả: ${author}`, desc].filter(Boolean);
    document.getElementById('comic-sub').textContent = subParts.join(' · ');

    if (tags) {
      const wrap = document.getElementById('comic-tags');
      tags.split(',').slice(0, 5).forEach(t => {
        const el = document.createElement('span');
        el.className = 'tag';
        el.textContent = t.trim();
        wrap.appendChild(el);
      });
    }

    if (image) {
      const img = document.getElementById('cover-img');
      img.onload = () => img.classList.add('loaded');
      img.onerror = () => { };
      img.src = image;
      document.getElementById('placeholder').style.display = 'none';
      ['og-image', 'tw-image'].forEach(id => document.getElementById(id).setAttribute('content', image));
    }

    document.getElementById('og-title').setAttribute('content', name + ' – Comic App');
    document.getElementById('og-desc').setAttribute('content', desc || 'Đọc truyện tranh online');
    document.getElementById('tw-title').setAttribute('content', name + ' – Comic App');

    /* ── Deep link ── */
    const deepPath = comicId ? `detail/${comicId}` : '';
    const intentUrl =
      `intent://${deepPath}` +
      `#Intent;scheme=${CFG.scheme}` +
      `;package=${CFG.package}` +
      `;end`;

    document.getElementById('btn-open').href = intentUrl;
    document.getElementById('btn-download').href = CFG.apkUrl;

    /* ── Open app (try once on load) ── */
    function tryOpenApp() {
      const t0 = Date.now();
      window.location.href = intentUrl;

      // If we're still on page after 2s → app not installed → show hint
      setTimeout(() => {
        if (Date.now() - t0 < 3000) {
          document.getElementById('status').classList.add('show');
        }
      }, 2000);
    }

    /* ── Click: open in app ── */
    document.getElementById('btn-open').addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('status').classList.remove('show');
      tryOpenApp();
    });

    /* ── Click: download ── */
    document.getElementById('btn-download').addEventListener('click', e => {
      e.preventDefault();
      const a = document.createElement('a');
      a.href = CFG.apkUrl;
      a.download = 'comic.apk';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    /* Auto-try open app on load */
    setTimeout(tryOpenApp, 500);
  </script>
</body>

</html>
